# =============================================================================
# CI — Pull Request
# Roda em todo PR para main:
#   1. Testes Python (unit + integration)
#   2. Build Docker (smoke test)
#   3. Terraform fmt + validate + plan
# =============================================================================
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Testes Python
  # ---------------------------------------------------------------------------
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Unit + Integration tests
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: sk-ant-fake
          QDRANT_URL: http://fake-qdrant
          QDRANT_API_KEY: fake-key
          AZURE_TENANT_ID: test-tenant
          AZURE_CLIENT_ID: test-client
          RAGAS_TEST_TOKEN: test-ragas-token
        run: pytest tests/unit/ tests/integration/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Docker smoke test — verifica que a imagem inicia sem ImportError
  # ---------------------------------------------------------------------------
  docker-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: pip install requests

      - name: Docker smoke test
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: sk-ant-fake
          QDRANT_URL: http://fake-qdrant
          QDRANT_API_KEY: fake-key
          AZURE_TENANT_ID: test-tenant
          AZURE_CLIENT_ID: test-client
          RAGAS_TEST_TOKEN: test-ragas-token
        run: pytest tests/docker/ -v -m docker --tb=short

  # ---------------------------------------------------------------------------
  # Terraform fmt + validate + plan
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check -recursive -diff

      - name: Terraform init
        working-directory: infra/terraform
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
        run: terraform init

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform
        env:
          ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_qdrant_url: ${{ secrets.QDRANT_URL }}
          TF_VAR_qdrant_api_key: ${{ secrets.QDRANT_API_KEY }}
          TF_VAR_ragas_test_token: ${{ secrets.RAGAS_TEST_TOKEN }}
          TF_VAR_ghcr_username: ${{ secrets.GHCR_USERNAME }}
          TF_VAR_ghcr_token: ${{ secrets.GHCR_TOKEN }}
        run: terraform plan -detailed-exitcode -out=tfplan || [ $? -eq 2 ]
