# =============================================================================
# CD — Deploy para produção
# Backend: roda apenas quando backend/** ou o próprio workflow muda
# Frontend: roda apenas quando frontend/** muda
# =============================================================================
name: CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/cd.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Detecta quais partes mudaram
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/cd.yml'
            frontend:
              - 'frontend/**'

  # ---------------------------------------------------------------------------
  # Testes Python — só quando backend mudou
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-test.txt

      - name: Unit + Integration tests
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: sk-ant-fake
          QDRANT_URL: http://fake-qdrant
          QDRANT_API_KEY: fake-key
          AZURE_TENANT_ID: test-tenant
          AZURE_CLIENT_ID: test-client
          RAGAS_TEST_TOKEN: test-ragas-token
          ASSEMBLYAI_API_KEY: fake-assemblyai-key
          AZURE_STORAGE_ACCOUNT_NAME: fake-storage
          AZURE_STORAGE_ACCOUNT_KEY: ZmFrZWtleWZha2VrZXlmYWtla2V5ZmFrZWtleWZha2VrZXlmYWtla2V5ZmFrZWtleWZha2VrZXlmYWtla2V5Zg==
          AZURE_STORAGE_CONTAINER: uploads
        run: pytest tests/unit/ tests/integration/ -v --tb=short


  # ---------------------------------------------------------------------------
  # Build + Push imagem — só quando backend mudou
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true'
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-professor-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ---------------------------------------------------------------------------
  # Deploy backend — só quando backend mudou
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [changes, build-push]
    if: needs.changes.outputs.backend == 'true'

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy nova revisão
        run: |
          IMAGE="ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-professor-backend:sha-${GITHUB_SHA::7}"
          az containerapp update \
            --name ai-professor-backend \
            --resource-group ai-professor-prod-rg \
            --image "$IMAGE"

      - name: Health check
        run: |
          URL="https://ai-professor-backend.bluedesert-c198f5d7.eastus.azurecontainerapps.io/health"
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check ok ($STATUS)"
              exit 0
            fi
            echo "Aguardando... ($i/24) status=$STATUS"
            sleep 15
          done
          echo "Health check falhou após 6 minutos"
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy frontend — só quando frontend mudou (paralelo ao backend)
  # ---------------------------------------------------------------------------
  frontend-deploy:
    name: Frontend Deploy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend/browser
