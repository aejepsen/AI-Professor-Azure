# =============================================================================
# CD — Deploy para produção
# Roda em push para main (após PR aprovado e mergeado):
#   1. Testes Python + Docker smoke test
#   2. Build + push imagem para ghcr.io
#   3. Deploy no Azure Container App
# =============================================================================
name: CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/cd.yml"

jobs:
  # ---------------------------------------------------------------------------
  # Testes (gate obrigatório antes do deploy)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Unit + Integration tests
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: sk-ant-fake
          QDRANT_URL: http://fake-qdrant
          QDRANT_API_KEY: fake-key
          AZURE_TENANT_ID: test-tenant
          AZURE_CLIENT_ID: test-client
          RAGAS_TEST_TOKEN: test-ragas-token
          ASSEMBLYAI_API_KEY: fake-assemblyai-key
        run: pytest tests/unit/ tests/integration/ -v --tb=short

      - name: Install test dependencies for Docker
        run: pip install requests

      - name: Docker smoke test
        working-directory: backend
        run: pytest tests/docker/ -v -m docker --tb=short

  # ---------------------------------------------------------------------------
  # Build + Push imagem para ghcr.io
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-professor-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ---------------------------------------------------------------------------
  # Deploy no Azure Container App
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy nova revisão
        run: |
          IMAGE="ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-professor-backend:sha-${GITHUB_SHA::7}"
          az containerapp update \
            --name ai-professor-backend \
            --resource-group ai-professor-prod-rg \
            --image "$IMAGE"

      - name: Health check
        run: |
          URL="https://ai-professor-backend.bluedesert-c198f5d7.eastus.azurecontainerapps.io/health"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health check ok ($STATUS)"
              exit 0
            fi
            echo "Aguardando... ($i/12)"
            sleep 10
          done
          echo "Health check falhou após 2 minutos"
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy do frontend no Azure Static Web Apps
  # ---------------------------------------------------------------------------
  frontend-deploy:
    name: Frontend Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist/frontend/browser
